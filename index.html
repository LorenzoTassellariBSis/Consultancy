<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Time Tracker</h1>
            <p class="subtitle">Track your work days this month</p>
            <div class="month-badge" id="currentMonth"></div>
        </header>

        <div class="summary-card">
            <div class="total-display">
                <div class="total-number" id="totalDays">0</div>
                <div class="total-label">
                    days worked<br>this month
                </div>
            </div>
        </div>

        <div class="weeks-grid" id="weeksContainer">
            <!-- Week cards will be generated here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
